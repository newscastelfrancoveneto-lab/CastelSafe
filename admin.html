  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Ignora gli errori di caricamento risorse (tile mappa offline, backend non
    // raggiungibile, ecc.): non hanno messaggio e non riguardano lo spacchettamento.
    if (!e.message) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 34px 10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    var msgNode = d.querySelector('[data-err-msg]');
    if (!msgNode) {
      msgNode = document.createElement('span');
      msgNode.setAttribute('data-err-msg', '');
      d.appendChild(msgNode);
      var closeBtn = document.createElement('button');
      closeBtn.textContent = '\u00d7';
      closeBtn.setAttribute('aria-label', 'Chiudi');
      closeBtn.style.cssText = 'position:absolute;top:6px;right:8px;background:transparent;border:none;color:#ff8a80;font:18px/1 ui-monospace,monospace;cursor:pointer;padding:2px 6px';
      closeBtn.onclick = function() { d.remove(); };
      d.appendChild(closeBtn);
    }
    msgNode.textContent = (msgNode.textContent ? msgNode.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

om {\r\n\tmargin-top: 6px;\r\n}\r\n.leaflet-tooltip-top {\r\n\tmargin-top: -6px;\r\n}\r\n.leaflet-tooltip-bottom:before,\r\n.leaflet-tooltip-top:before {\r\n\tleft: 50%;\r\n\tmargin-left: -6px;\r\n\t}\r\n.leaflet-tooltip-top:before {\r\n\tbottom: 0;\r\n\tmargin-bottom: -12px;\r\n\tborder-top-color: #fff;\r\n\t}\r\n.leaflet-tooltip-bottom:before {\r\n\ttop: 0;\r\n\tmargin-top: -12px;\r\n\tmargin-left: -6px;\r\n\tborder-bottom-color: #fff;\r\n\t}\r\n.leaflet-tooltip-left {\r\n\tmargin-left: -6px;\r\n}\r\n.leaflet-tooltip-right {\r\n\tmargin-left: 6px;\r\n}\r\n.leaflet-tooltip-left:before,\r\n.leaflet-tooltip-right:before {\r\n\ttop: 50%;\r\n\tmargin-top: -6px;\r\n\t}\r\n.leaflet-tooltip-left:before {\r\n\tright: 0;\r\n\tmargin-right: -12px;\r\n\tborder-left-color: #fff;\r\n\t}\r\n.leaflet-tooltip-right:before {\r\n\tleft: 0;\r\n\tmargin-left: -12px;\r\n\tborder-right-color: #fff;\r\n\t}\r\n\r\n/* Printing */\r\n\r\n@media print {\r\n\t/* Prevent printers from removing background-images of controls. */\r\n\t.leaflet-control {\r\n\t\t-webkit-print-color-adjust: exact;\r\n\t\tprint-color-adjust: exact;\r\n\t\t}\r\n\t}\r\n<\u002Fstyle>\n  <script src=\"3b26b4ff-4fcd-45a5-b2de-49b9fa865bab\"><\u002Fscript>\n  <style>\n    :root{\n      --primary:#8d021f; --primary-700:#73021a; --primary-50:#fbeff1; --primary-100:#f7dde1;\n      --ok:#15803d; --ok-50:#ecfdf3; --ok-100:#d1fadf;\n      --danger:#c81e2c; --danger-50:#fdf0f1; --danger-100:#fad7da;\n      --warn:#c2660c; --warn-50:#fff5eb; --warn-100:#fde6cc;\n      --bg:#eef0f3; --panel:#ffffff;\n      --line:#e3e6eb; --line-strong:#d3d8e0;\n      --ink:#171b22; --muted:#646c79; --muted-2:#8a929e;\n      --shadow-sm:0 1px 2px rgba(20,24,33,.06);\n      --shadow-md:0 6px 18px -8px rgba(20,24,33,.22);\n      --shadow-lg:0 24px 48px -16px rgba(20,24,33,.28);\n      --r-sm:8px; --r-md:11px; --r-lg:16px; --r-xl:22px;\n    }\n    *{box-sizing:border-box;}\n    html,body{height:100%;}\n    body{margin:0;font-family:'Public Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n\n    /* ---------- buttons ---------- */\n    button{cursor:pointer;font-weight:600;font-family:inherit;border-radius:var(--r-sm);transition:background .18s ease,border-color .18s ease,box-shadow .18s ease,transform .06s ease;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border:1px solid transparent;font-size:.9rem;line-height:1;letter-spacing:-.01em;}\n    button svg{flex:none;}\n    button:active{transform:translateY(1px);}\n    button:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}\n    .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);}\n    .btn-primary:hover{background:var(--primary-700);}\n    .btn-ok{background:var(--ok);color:#fff;box-shadow:var(--shadow-sm);}\n    .btn-ok:hover{background:#116a32;}\n    .btn-danger{background:var(--danger-50);border-color:var(--danger-100);color:var(--danger);}\n    .btn-danger:hover{background:var(--danger-100);}\n    .btn-ghost{background:#fff;border-color:var(--line-strong);color:var(--ink);box-shadow:var(--shadow-sm);}\n    .btn-ghost:hover{background:#f6f7f9;border-color:#bcc3cd;}\n    .btn-small{padding:7px 11px;font-size:.78rem;}\n\n    /* ---------- inputs ---------- */\n    label{display:block;font-size:.8rem;margin:0 0 6px;font-weight:600;color:#3b424d;letter-spacing:-.01em;}\n    input,textarea,select{width:100%;padding:11px 13px;border:1px solid var(--line-strong);border-radius:var(--r-sm);font-family:inherit;font-size:.95rem;color:var(--ink);background:#fff;transition:border-color .18s ease,box-shadow .18s ease;}\n    input::placeholder,textarea::placeholder{color:var(--muted-2);}\n    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(141,2,31,.13);}\n    textarea{resize:vertical;min-height:78px;line-height:1.45;}\n\n    /* ---------- login ---------- */\n    #login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;\n      background:\n        radial-gradient(900px 500px at 12% -8%,rgba(141,2,31,.10),transparent 60%),\n        radial-gradient(800px 600px at 108% 110%,rgba(141,2,31,.07),transparent 55%),\n        linear-gradient(180deg,#f3f5f8 0%,#e7eaef 100%);\n    }\n    .login-card{background:#fff;padding:34px 30px 28px;width:100%;max-width:404px;border-radius:var(--r-xl);box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,.7);}\n    .login-crest{display:flex;align-items:center;gap:12px;margin-bottom:22px;}\n    .crest-mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(160deg,var(--primary),var(--primary-700));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;letter-spacing:.02em;box-shadow:var(--shadow-md);flex:none;}\n    .crest-text{line-height:1.2;}\n    .crest-text .eyebrow{font-size:.66rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--primary);}\n    .crest-text .place{font-size:.95rem;font-weight:700;color:var(--ink);}\n    .login-card h1{font-size:1.42rem;margin:0 0 7px;letter-spacing:-.02em;font-weight:800;}\n    .login-card .sub{font-size:.9rem;color:var(--muted);margin:0 0 22px;line-height:1.5;}\n    .field{margin-bottom:15px;}\n    .login-back-link{display:flex;width:100%;margin-top:12px;text-decoration:none;justify-content:center;align-items:center;padding:11px 16px;box-sizing:border-box;}\n\n    /* ---------- admin shell ---------- */\n    #admin{display:none;height:100vh;overflow:hidden;flex-direction:column;}\n    .topbar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:13px 22px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:1000;}\n    .brand{display:flex;align-items:center;gap:13px;min-width:0;}\n    .brand .crest-mark{width:40px;height:40px;border-radius:11px;font-size:.95rem;}\n    .brand-text{min-width:0;line-height:1.25;}\n    .brand-eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--primary);}\n    .brand-title{margin:0;font-size:1.04rem;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n    .topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}\n    .topbar-link{display:inline-flex;align-items:center;gap:7px;padding:11px 15px;border:1px solid var(--line-strong);border-radius:var(--r-sm);text-decoration:none;color:var(--ink);background:#fff;font-weight:600;font-size:.88rem;box-shadow:var(--shadow-sm);transition:background .18s ease,border-color .18s ease;}\n    .topbar-link:hover{background:#f6f7f9;border-color:#bcc3cd;}\n\n    /* mode toggle button (id #modeToggleBtn — text set by script) */\n    #modeToggleBtn{background:var(--primary-50);border-color:var(--primary-100);color:var(--primary);font-weight:700;}\n    #modeToggleBtn::before{content:\"\";width:8px;height:8px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 3px rgba(141,2,31,.15);}\n    #modeToggleBtn:hover{background:var(--primary-100);}\n\n    /* osm loader */\n    .osm-loader{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:var(--r-sm);border:1px solid var(--line-strong);background:#fff;color:var(--muted);font-size:.82rem;font-weight:600;box-shadow:var(--shadow-sm);}\n    .osm-loader.loading{color:#0369a1;border-color:#bae6fd;background:#f0f9ff;}\n    .spinner{width:14px;height:14px;border:2px solid #cbd5e1;border-top-color:currentColor;border-radius:50%;display:none;animation:spin .8s linear infinite;}\n    .osm-loader.loading .spinner{display:block;}\n    @keyframes spin{to{transform:rotate(360deg);}}\n\n    /* ---------- layout ---------- */\n    .layout{display:flex;flex:1;overflow:hidden;position:relative;}\n    .panel{width:436px;background:var(--bg);border-right:1px solid var(--line);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;z-index:10;}\n    #map{flex:1;height:100%;z-index:1;background:#dfe3e8;}\n\n    .panel-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm);}\n    .card-head{margin-bottom:16px;}\n    .panel-card h1{font-size:1.08rem;margin:0;font-weight:800;letter-spacing:-.02em;}\n    .hint{font-size:.83rem;color:var(--muted);margin:7px 0 0;line-height:1.5;}\n\n    .form-grid{display:flex;flex-direction:column;gap:14px;}\n    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}\n\n    #state{margin-top:4px;font-weight:600;font-size:.83rem;color:#0c4a6e;padding:11px 13px;background:#eff8ff;border:1px solid #cfe8fb;border-radius:var(--r-sm);display:none;line-height:1.4;}\n    #state:not(:empty){display:block;}\n\n    .form-actions{display:flex;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}\n    .form-actions button{flex:1;padding:12px 14px;font-size:.92rem;}\n\n    /* ---------- alerts list ---------- */\n    .alerts-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:6px;}\n    .alerts-head h1{font-size:1.08rem;margin:0;font-weight:800;letter-spacing:-.02em;}\n    .list{display:grid;gap:11px;margin-top:14px;}\n    .alert-item{border:1px solid var(--line);border-radius:var(--r-md);padding:14px 15px 14px 17px;background:#fff;position:relative;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;}\n    .alert-item:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}\n    .alert-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}\n    .alert-item.alert-active{border-color:var(--danger-100);background:var(--danger-50);}\n    .alert-item.alert-active::before{background:var(--danger);}\n    .alert-item.alert-upcoming{border-color:var(--warn-100);background:var(--warn-50);}\n    .alert-item.alert-upcoming::before{background:var(--warn);}\n    .alert-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}\n    .alert-title{margin:0;font-size:.97rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3;}\n    .alert-meta{margin:9px 0 0;font-size:.78rem;color:#4a5360;font-weight:600;display:flex;align-items:center;gap:5px;}\n    .alert-meta svg{flex:none;opacity:.7;}\n    .alert-desc{margin:8px 0 0;font-size:.84rem;color:#3b424d;line-height:1.5;}\n    .alert-desc strong{color:var(--ink);}\n    .empty{color:var(--muted);font-size:.88rem;border:1.5px dashed var(--line-strong);border-radius:var(--r-md);padding:26px 20px;text-align:center;background:#fafbfc;line-height:1.5;}\n\n    /* ---------- mobile tabs ---------- */\n    .mobile-tabs{display:none;gap:6px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:5px;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:30;}\n    .mtab{flex:1;background:transparent;border:none;color:var(--muted);font-weight:700;font-size:.85rem;padding:11px 10px;border-radius:8px;}\n    .mtab.active{background:var(--primary);color:#fff;box-shadow:var(--shadow-sm);}\n\n    /* ---------- leaflet polish ---------- */\n    .leaflet-bar a{border-color:var(--line)!important;color:var(--ink)!important;}\n    .leaflet-bar a:hover{background:#f6f7f9!important;}\n    .leaflet-control-zoom{border-radius:var(--r-sm)!important;overflow:hidden;box-shadow:var(--shadow-md)!important;border:none!important;}\n    .leaflet-popup-content-wrapper{border-radius:var(--r-md);box-shadow:var(--shadow-lg);}\n    .leaflet-popup-content{font-family:'Public Sans',sans-serif;font-size:.85rem;line-height:1.5;color:var(--ink);}\n    .leaflet-container{font-family:'Public Sans',sans-serif;}\n\n    /* ---------- responsive ---------- */\n    @media (max-width:960px){\n      #admin{height:auto;min-height:100vh;overflow:visible;}\n      .topbar{flex-direction:column;align-items:stretch;padding:14px 16px;gap:12px;}\n      .topbar-actions{justify-content:flex-start;gap:8px;}\n      .topbar-actions > *{flex:1 1 auto;justify-content:center;min-width:fit-content;}\n      .layout{flex-direction:column;overflow:visible;}\n      #map{height:46vh;min-height:300px;flex:none;position:sticky;top:0;z-index:20;border-bottom:3px solid var(--primary);}\n      .panel{width:100%;border-right:none;padding:14px;overflow:visible;gap:12px;}\n      .mobile-tabs{display:flex;}\n      .panel[data-tab=\"form\"] #alertsCard{display:none;}\n      .panel[data-tab=\"alerts\"] #formCard{display:none;}\n    }\n    @media (max-width:640px){\n      .login-card{padding:26px 22px;}\n      .row{grid-template-columns:1fr;gap:14px;}\n      .topbar-actions{flex-wrap:wrap;}\n      .topbar-actions > *{flex:1 1 calc(50% - 4px);}\n      #map{height:42vh;}\n      .form-actions{flex-direction:column;}\n    }\n\n    ::-webkit-scrollbar{width:9px;height:9px;}\n    ::-webkit-scrollbar-track{background:transparent;}\n    ::-webkit-scrollbar-thumb{background:#c6ccd5;border-radius:5px;border:2px solid transparent;background-clip:padding-box;}\n    ::-webkit-scrollbar-thumb:hover{background:#aab2bd;background-clip:padding-box;}\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"login\">\n  <div class=\"login-card\">\n    <div class=\"login-crest\">\n      <div class=\"crest-mark\">CV<\u002Fdiv>\n      <div class=\"crest-text\">\n        <div class=\"eyebrow\">Comune di<\u002Fdiv>\n        <div class=\"place\">Castelfranco Veneto<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <h1>Amministrazione Chiusure<\u002Fh1>\n    <p class=\"sub\">Accesso riservato. Crea e gestisci gli avvisi di chiusura su punti, linee e aree del territorio.<\u002Fp>\n    <div class=\"field\">\n      <label>Username<\u002Flabel>\n      <input id=\"username\" value=\"admin\" autocomplete=\"off\">\n    <\u002Fdiv>\n    <div class=\"field\" style=\"margin-bottom:22px;\">\n      <label>Password<\u002Flabel>\n      <input id=\"password\" type=\"password\" placeholder=\"••••••••\" autocomplete=\"current-password\">\n    <\u002Fdiv>\n    <button class=\"btn-primary\" id=\"loginBtn\" style=\"width:100%;padding:13px;font-size:1rem;\">Accedi al pannello<\u002Fbutton>\n    <a href=\"./index.html\" class=\"btn-ghost login-back-link\">Torna alla mappa pubblica<\u002Fa>\n    <div id=\"loginMsg\" class=\"hint\" style=\"margin-top:14px;color:var(--danger);font-weight:600;text-align:center;\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"admin\" style=\"display:none;\">\n  <div class=\"topbar\">\n    <div class=\"brand\">\n      <div class=\"crest-mark\">CV<\u002Fdiv>\n      <div class=\"brand-text\">\n        <div class=\"brand-eyebrow\">Pannello Amministratore<\u002Fdiv>\n        <p class=\"brand-title\">Gestione chiusure strade<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"topbar-actions\">\n      <button id=\"modeToggleBtn\" class=\"btn-ghost\" type=\"button\" title=\"Attiva/disattiva modalità editing\">Modalità avvisi attivi<\u002Fbutton>\n      <div id=\"osmLoader\" class=\"osm-loader\" aria-live=\"polite\"><span class=\"spinner\" aria-hidden=\"true\"><\u002Fspan><span id=\"osmLoaderText\">Dati OSM pronti<\u002Fspan><\u002Fdiv>\n      <a href=\"./index.html\" class=\"topbar-link\"><svg width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7\"><\u002Fpath><\u002Fsvg>Mappa pubblica<\u002Fa>\n      <button id=\"logoutBtn\" class=\"btn-ghost\"><svg width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1\"><\u002Fpath><\u002Fsvg>Logout<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"layout\">\n    <div class=\"panel\" id=\"panel\" data-tab=\"form\">\n      <div class=\"mobile-tabs\" role=\"tablist\">\n        <button type=\"button\" class=\"mtab active\" data-tab=\"form\">Nuovo avviso<\u002Fbutton>\n        <button type=\"button\" class=\"mtab\" data-tab=\"alerts\" id=\"alertsTab\">Avvisi configurati<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"panel-card\" id=\"formCard\">\n        <div class=\"card-head\">\n          <h1 id=\"panelTitle\">Nuovo avviso chiusura<\u002Fh1>\n          <p class=\"hint\" id=\"panelHint\">Sposta la mappa per caricare i dati OSM. Clicca sugli elementi per selezionarli e compila il form.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"form-grid\">\n          <div>\n            <label>Titolo dell'avviso<\u002Flabel>\n            <input id=\"title\" placeholder=\"Es. Chiusura Via Roma per lavori\">\n          <\u002Fdiv>\n          <div>\n            <label>Descrizione dettagliata<\u002Flabel>\n            <textarea id=\"description\" rows=\"3\" placeholder=\"Aggiungi dettagli, deviazioni, motivazioni...\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div class=\"row\"><div><label>Data inizio<\u002Flabel><input id=\"startDate\" type=\"date\"><\u002Fdiv><div><label>Ora inizio<\u002Flabel><input id=\"startTime\" type=\"time\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"row\"><div><label>Data fine<\u002Flabel><input id=\"endDate\" type=\"date\"><\u002Fdiv><div><label>Ora fine<\u002Flabel><input id=\"endTime\" type=\"time\"><\u002Fdiv><\u002Fdiv>\n          <div id=\"state\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-actions\">\n          <button class=\"btn-ok\" id=\"saveBtn\"><svg width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M5 13l4 4L19 7\"><\u002Fpath><\u002Fsvg>Salva avviso<\u002Fbutton>\n          <button class=\"btn-danger\" id=\"clearDraftBtn\">Cancella selezione<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel-card\" id=\"alertsCard\">\n        <div class=\"alerts-head\"><h1>Gestione avvisi<\u002Fh1><button id=\"deleteAllBtn\" class=\"btn-danger btn-small\">Svuota tutto<\u002Fbutton><\u002Fdiv>\n        <p class=\"hint\" style=\"margin-top:0;\">Elenco degli avvisi attualmente configurati a sistema.<\u002Fp>\n        <div id=\"alertsList\" class=\"list\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"map\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\nconst SERVER_URL = 'https://parthenocarpically-presymphonic-alesia.ngrok-free.dev';\nconst CLOSURES_API_URL = 'https://parthenocarpically-presymphonic-alesia.ngrok-free.dev/api/closures';\nconst AUTH_TOKEN_KEY = 'closure_admin_token';\nconst STORAGE_KEY = 'closure_alerts_geojson_v1';\nconst OVERPASS_ENDPOINTS = [\n  'https://overpass.private.coffee/api/interpreter',\n  'https://overpass.kumi.systems/api/interpreter',\n  'https://overpass-api.de/api/interpreter'\n];\nconst OVERPASS_PROXY = SERVER_URL + '/api/overpass';\nconst TILE_CACHE_BUSTER = Date.now();\nconst PICK_TOLERANCE_PX = window.innerWidth <= 768 ? 34 : 24;\nconst login = document.getElementById('login');\nconst admin = document.getElementById('admin');\nconst loginMsg = document.getElementById('loginMsg');\nfunction getToken(){ return sessionStorage.getItem(AUTH_TOKEN_KEY); }\nfunction setToken(value){ if(value) sessionStorage.setItem(AUTH_TOKEN_KEY, value); else sessionStorage.removeItem(AUTH_TOKEN_KEY); }\nfunction authHeaders(extra={}){ const token=getToken(); return { ...extra, 'ngrok-skip-browser-warning':'true', ...(token ? { Authorization:`Bearer ${token}` } : {}) }; }\nfunction setLogged(value) {\n  login.style.display = value ? 'none' : 'flex';\n  admin.style.display = value ? 'flex' : 'none';\n  if (value && !window._adminMapInit) initAdminMap();\n  else if (value && map) { setMode(false); requestAnimationFrame(() => map.invalidateSize(true)); }\n}\nasync function checkSession(){\n  const token = getToken();\n  if (!token) return setLogged(false);\n  try {\n    const response = await fetch(`${SERVER_URL}/api/admin/check`, { headers: authHeaders() });\n    if (!response.ok) throw new Error('unauthorized');\n    setLogged(true);\n  } catch {\n    setToken(null);\n    setLogged(false);\n  }\n}\nasync function serverLogout(){\n  const token = getToken();\n  if (!token) return;\n  try {\n    await fetch(`${SERVER_URL}/api/admin/logout`, { method:'POST', headers: authHeaders() });\n  } catch {}\n}\nfunction forceLogoutOnExit(){ setToken(null); }\ndocument.getElementById(\"loginBtn\").onclick = async () => {\n  const u = document.getElementById(\"username\").value.trim();\n  const p = document.getElementById(\"password\").value;\n  loginMsg.textContent = \"\";\n\n  try {\n    const response = await fetch(`${SERVER_URL}/api/admin/login`, {\n      method: \"POST\",\n      headers: authHeaders({\n        \"Content-Type\": \"application/json\",\n        \"ngrok-skip-browser-warning\": \"true\"\n      }),\n      body: JSON.stringify({ username: u, password: p })\n    });\n\n    let detail = \"\";\n    try {\n      const errorPayload = await response.clone().json();\n      detail = errorPayload?.detail || \"\";\n    } catch {\n      detail = \"\";\n    }\n\n    if (!response.ok) {\n      if (response.status === 401) {\n        loginMsg.textContent = detail || \"Credenziali non valide.\";\n      } else if (response.status === 429) {\n        loginMsg.textContent = detail || \"Troppi tentativi di accesso. Riprova tra qualche minuto.\";\n      } else if (response.status >= 500) {\n        loginMsg.textContent = detail || \"Errore del server. Controlla il Raspberry.\";\n      } else {\n        loginMsg.textContent = detail || `Errore di accesso (${response.status}).`;\n      }\n      return;\n    }\n\n    const payload = await r
